apiVersion: v1
kind: ConfigMap
metadata:
  name: chirpstack-config
  namespace: iot
data:
  chirpstack.toml: |
    [logging]
      level = "info"

    [postgresql]
      dsn = "postgres://chirpstack:${POSTGRES_PASSWORD}@postgres-chirpstack:5432/chirpstack?sslmode=disable"

    [redis]
      servers = ["redis://redis-chirpstack:6379"]

    [network]
      net_id = "000000"
      enabled_regions = ["eu868"]

    [api]
      bind = "0.0.0.0:8080"
      secret = "youmustchangethissecret2026"

    [ui]
      base_path = "/chirpstack"

    [[regions]]
      name = "eu868"
      common_name = "EU868"

      [regions.gateway]
        force_gws_private = false

        [regions.gateway.backend.mqtt]
          server = "tcp://mosquitto:1883"
          username = ""
          password = ""

      [regions.network]
        installation_margin = 10
        rx1_delay = 1
        rx2_frequency = 869525000
        rx2_dr = 0
        rx1_dr_offset = 0
        downlink_tx_power = -1
