# Valores mínimos para que funcione el dashboard con certResolver
api:
  dashboard: true
  insecure: false   # Queremos autenticación

ingressRoute:
  dashboard:
    enabled: false   # Desactivamos el automático, usaremos el manual

# Exponer puertos necesarios
ports:
  web:
    port: 8000
    exposedPort: 80
    hostPort: 80
    protocol: TCP
  websecure:
    port: 8443
    exposedPort: 443
    hostPort: 443
    protocol: TCP

# Proveedores
providers:
  kubernetesCRD:
    enabled: true
    allowCrossNamespace: true
  kubernetesIngress:
    enabled: true
    publishedService:
      enabled: true

# Logs (opcional pero útil)
logs:
  general:
    level: INFO
  access:
    enabled: true