controller:
  admin:
    createSecret: false
    existingSecret: jenkins-admin
    userKey: jenkins-admin-user
    passwordKey: jenkins-admin-password

  serviceType: ClusterIP

  ingress:
    enabled: false

  jenkinsUrl: "https://93d92c4a-e3bf-4ea6-93c6.afab44153cac.isard.nuvulet.itb.cat/jenkins"
  jenkinsUriPrefix: "/jenkins"

  installPlugins:
    - kubernetes:latest
    - workflow-aggregator:latest
    - git:latest
    - docker-workflow:latest
    - blueocean:latest
    - credentials-binding:latest

  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1
      memory: 2Gi

  persistence:
    enabled: true
    storageClass: longhorn
    size: 10Gi

agent:
  enabled: true
  namespace: jenkins
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 1
      memory: 1Gi
