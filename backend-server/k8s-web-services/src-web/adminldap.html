<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FireSense — LDAP Control</title>
<link rel="icon" type="image/png" href="favicon.png?v=5">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;600;700;900&family=Exo+2:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --cyan:#00e5ff;--cyan2:rgba(0,229,255,.6);--cyan3:rgba(0,229,255,.15);
  --green:#39ff14;--green2:rgba(57,255,20,.5);--green3:rgba(57,255,20,.12);
  --red:#ff3355;--red2:rgba(255,51,85,.5);--amber:#ffb300;
  --bg:#020912;--bg2:#040f1a;--bg3:#061525;
  --border:rgba(0,229,255,.18);--border2:rgba(0,229,255,.08);
  --text:#c8e8ff;--muted:rgba(180,220,255,.4);--muted2:rgba(180,220,255,.25);
  --glow:0 0 20px rgba(0,229,255,.3);--glow2:0 0 40px rgba(0,229,255,.15);
}

/* ANIMATED BG */
body{
  background:var(--bg);color:var(--text);
  font-family:'Exo 2',sans-serif;min-height:100vh;overflow-x:hidden;
  position:relative;
}
.bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}
.grid-overlay{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:
    linear-gradient(rgba(0,229,255,.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,229,255,.03) 1px, transparent 1px);
  background-size:60px 60px;
  animation:gridShift 20s linear infinite;
}
@keyframes gridShift{from{background-position:0 0;}to{background-position:60px 60px;}}

.orb{position:fixed;border-radius:50%;pointer-events:none;filter:blur(80px);z-index:0;}
.orb1{width:600px;height:600px;background:radial-gradient(circle,rgba(0,229,255,.08),transparent 70%);top:-200px;right:-200px;animation:orbFloat1 15s ease-in-out infinite;}
.orb2{width:400px;height:400px;background:radial-gradient(circle,rgba(57,255,20,.06),transparent 70%);bottom:-100px;left:-100px;animation:orbFloat2 20s ease-in-out infinite;}
.orb3{width:300px;height:300px;background:radial-gradient(circle,rgba(0,100,255,.05),transparent 70%);top:50%;left:50%;animation:orbFloat3 25s ease-in-out infinite;}
@keyframes orbFloat1{0%,100%{transform:translate(0,0);}50%{transform:translate(-50px,30px);}}
@keyframes orbFloat2{0%,100%{transform:translate(0,0);}50%{transform:translate(40px,-40px);}}
@keyframes orbFloat3{0%,100%{transform:translate(-50%,-50%);}50%{transform:translate(-45%,-55%);}}

/* SCANLINES */
.scanlines{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.1) 2px,rgba(0,0,0,.1) 4px);
}

/* CORNER DECORATIONS */
.corner{position:fixed;width:60px;height:60px;z-index:2;pointer-events:none;}
.corner-tl{top:80px;left:16px;border-top:1px solid var(--cyan2);border-left:1px solid var(--cyan2);}
.corner-tr{top:80px;right:16px;border-top:1px solid var(--cyan2);border-right:1px solid var(--cyan2);}
.corner-bl{bottom:16px;left:16px;border-bottom:1px solid var(--cyan2);border-left:1px solid var(--cyan2);}
.corner-br{bottom:16px;right:16px;border-bottom:1px solid var(--cyan2);border-right:1px solid var(--cyan2);}

/* ALL CONTENT */
.content{position:relative;z-index:2;}

/* TOPBAR */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 32px;height:60px;
  background:rgba(2,9,18,.85);
  border-bottom:1px solid var(--border);
  backdrop-filter:blur(20px);
  position:sticky;top:0;z-index:100;
}
.topbar::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--cyan),transparent);
  opacity:.5;
}
.logo{display:flex;align-items:center;gap:12px;}
.logo-icon{
  width:32px;height:32px;
  border:1px solid var(--cyan2);
  display:flex;align-items:center;justify-content:center;
  position:relative;
  clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
  background:var(--cyan3);
}
.logo-icon::before{
  content:'';position:absolute;inset:4px;
  clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
  background:var(--cyan);opacity:.3;
  animation:iconPulse 2s ease-in-out infinite;
}
@keyframes iconPulse{0%,100%{opacity:.3;}50%{opacity:.7;};}
.logo-text{font-family:'Orbitron',monospace;font-size:.85rem;font-weight:700;letter-spacing:.15em;color:var(--cyan);}
.logo-sub{font-family:'Share Tech Mono',monospace;font-size:.6rem;letter-spacing:.25em;color:var(--muted);margin-top:1px;}

.topbar-right{display:flex;align-items:center;gap:16px;}
.sys-status{display:flex;align-items:center;gap:8px;}
.sys-dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:blink 1.5s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;};}
.sys-txt{font-family:'Share Tech Mono',monospace;font-size:.65rem;letter-spacing:.15em;color:var(--green2);}
.admin-badge{
  font-family:'Share Tech Mono',monospace;font-size:.6rem;letter-spacing:.2em;
  color:var(--cyan);background:var(--cyan3);
  border:1px solid var(--border);padding:4px 12px;
  clip-path:polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%);
}
.btn-logout{
  font-family:'Share Tech Mono',monospace;font-size:.65rem;letter-spacing:.15em;
  color:var(--muted);background:transparent;
  border:1px solid rgba(255,255,255,.1);
  padding:5px 14px;cursor:pointer;transition:all .2s;
  clip-path:polygon(6px 0%,100% 0%,calc(100% - 6px) 100%,0% 100%);
}
.btn-logout:hover{color:var(--red);border-color:var(--red2);}

/* LOGIN */
.login-wrap{
  display:flex;align-items:center;justify-content:center;
  min-height:calc(100vh - 60px);padding:40px 20px;
}
.login-box{
  width:100%;max-width:420px;
  background:rgba(4,15,26,.8);
  border:1px solid var(--border);
  backdrop-filter:blur(20px);
  position:relative;overflow:hidden;
  animation:boxIn .6s ease both;
}
@keyframes boxIn{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
.login-box::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--cyan),var(--green),transparent);
  animation:scanLine 3s linear infinite;
}
@keyframes scanLine{0%{background-position:0% 0%;}100%{background-position:200% 0%;}}
.login-header{
  padding:32px 32px 0;
  border-bottom:1px solid var(--border2);
  padding-bottom:24px;
  margin-bottom:28px;
}
.login-eyebrow{
  font-family:'Share Tech Mono',monospace;font-size:.6rem;
  letter-spacing:.3em;color:var(--cyan2);margin-bottom:10px;
}
.login-title{
  font-family:'Orbitron',monospace;font-size:1.4rem;
  font-weight:700;color:#fff;letter-spacing:.08em;
  text-shadow:0 0 20px rgba(0,229,255,.4);
}
.login-title span{color:var(--cyan);}
.login-body{padding:0 32px 32px;}

.field{margin-bottom:20px;}
.field-lbl{
  font-family:'Share Tech Mono',monospace;font-size:.6rem;
  letter-spacing:.25em;color:var(--muted);
  display:flex;align-items:center;gap:8px;margin-bottom:8px;
}
.field-lbl::before{content:'//';color:var(--cyan3);}
.field-inp{
  width:100%;background:rgba(0,229,255,.04);
  border:1px solid var(--border2);
  border-bottom:1px solid var(--border);
  color:var(--text);
  font-family:'Share Tech Mono',monospace;font-size:.85rem;
  padding:11px 16px;outline:none;
  transition:all .2s;
  clip-path:polygon(0 0,calc(100% - 12px) 0,100% 12px,100% 100%,0 100%);
}
.field-inp:focus{
  border-color:var(--cyan2);
  background:rgba(0,229,255,.07);
  box-shadow:0 0 20px rgba(0,229,255,.1);
}
.field-inp::placeholder{color:var(--muted2);}

.btn-enter{
  width:100%;padding:13px;
  background:linear-gradient(135deg,rgba(0,229,255,.15),rgba(57,255,20,.1));
  border:1px solid var(--cyan2);
  color:var(--cyan);
  font-family:'Orbitron',monospace;font-size:.75rem;
  font-weight:700;letter-spacing:.2em;
  cursor:pointer;transition:all .3s;
  position:relative;overflow:hidden;
  clip-path:polygon(12px 0%,100% 0%,calc(100% - 12px) 100%,0% 100%);
}
.btn-enter::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(0,229,255,.3),rgba(57,255,20,.2));
  opacity:0;transition:opacity .3s;
}
.btn-enter:hover::before{opacity:1;}
.btn-enter:hover{box-shadow:0 0 30px rgba(0,229,255,.3),0 0 60px rgba(0,229,255,.1);}
.btn-enter:active{transform:scale(.99);}

.login-err{
  font-family:'Share Tech Mono',monospace;font-size:.7rem;
  color:var(--red);letter-spacing:.1em;
  margin-top:12px;display:none;
  padding:8px 12px;
  background:rgba(255,51,85,.08);border:1px solid rgba(255,51,85,.2);
}
.login-err::before{content:'⚠ ';}

/* DASHBOARD */
.main{max-width:1200px;margin:0 auto;padding:40px 32px;}

.page-header{margin-bottom:40px;animation:fadeIn .5s ease both;}
@keyframes fadeIn{from{opacity:0;transform:translateY(-10px);}to{opacity:1;transform:translateY(0);}}
.page-eyebrow{
  font-family:'Share Tech Mono',monospace;font-size:.65rem;
  letter-spacing:.3em;color:var(--cyan2);margin-bottom:8px;
  display:flex;align-items:center;gap:8px;
}
.page-eyebrow::before{display:none;}
.page-title{
  font-family:'Orbitron',monospace;font-size:1.6rem;
  font-weight:900;color:#fff;letter-spacing:.06em;
  text-shadow:0 0 30px rgba(0,229,255,.3);
}
.page-title span{color:var(--cyan);}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:40px;}
.stat{
  background:rgba(4,15,26,.7);
  border:1px solid var(--border2);
  padding:24px;position:relative;overflow:hidden;
  transition:all .3s;animation:fadeIn .5s ease both;
  clip-path:polygon(0 0,calc(100% - 16px) 0,100% 16px,100% 100%,0 100%);
}
.stat:hover{border-color:var(--border);transform:translateY(-2px);}
.stat::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  opacity:.6;
}
.stat.total::before{background:linear-gradient(90deg,transparent,var(--cyan),transparent);}
.stat.pending::before{background:linear-gradient(90deg,transparent,var(--amber),transparent);}
.stat.approved::before{background:linear-gradient(90deg,transparent,var(--green),transparent);}
.stat.rejected::before{background:linear-gradient(90deg,transparent,var(--red),transparent);}

.stat-val{
  font-family:'Orbitron',monospace;font-size:2.4rem;font-weight:900;
  line-height:1;letter-spacing:.05em;
  text-shadow:0 0 20px currentColor;
}
.stat.total .stat-val{color:var(--cyan);}
.stat.pending .stat-val{color:var(--amber);}
.stat.approved .stat-val{color:var(--green);}
.stat.rejected .stat-val{color:var(--red);}
.stat-lbl{
  font-family:'Share Tech Mono',monospace;font-size:.6rem;
  letter-spacing:.25em;color:var(--muted);margin-top:6px;
}
.stat-bar{height:2px;margin-top:14px;border-radius:1px;background:rgba(255,255,255,.05);}
.stat-bar-fill{height:100%;border-radius:1px;transition:width .8s ease;}
.stat.total .stat-bar-fill{background:var(--cyan);}
.stat.pending .stat-bar-fill{background:var(--amber);}
.stat.approved .stat-bar-fill{background:var(--green);}
.stat.rejected .stat-bar-fill{background:var(--red);}

/* FILTERS */
.filters{display:flex;gap:8px;margin-bottom:20px;align-items:center;}
.filter-label{font-family:'Share Tech Mono',monospace;font-size:.6rem;letter-spacing:.2em;color:var(--muted2);margin-right:4px;}
.filter-btn{
  font-family:'Share Tech Mono',monospace;font-size:.65rem;
  letter-spacing:.15em;padding:6px 16px;
  border:1px solid var(--border2);background:transparent;
  color:var(--muted);cursor:pointer;transition:all .2s;
  clip-path:polygon(6px 0%,100% 0%,calc(100% - 6px) 100%,0% 100%);
}
.filter-btn:hover,.filter-btn.active{
  background:var(--cyan3);border-color:var(--border);color:var(--cyan);
  box-shadow:0 0 12px rgba(0,229,255,.1);
}

/* TABLE */
.table-wrap{
  background:rgba(4,15,26,.6);
  border:1px solid var(--border2);
  backdrop-filter:blur(10px);
  overflow:hidden;
  animation:fadeIn .6s ease .1s both;
}
.table-wrap::before{
  content:'';display:block;height:1px;
  background:linear-gradient(90deg,transparent,var(--cyan2),transparent);
}
.table-header{
  display:grid;grid-template-columns:1.5fr 2fr 1fr 1fr 2.2fr;
  padding:0 24px;
  background:rgba(0,229,255,.03);
  border-bottom:1px solid var(--border2);
}
.th{
  font-family:'Share Tech Mono',monospace;font-size:.6rem;
  letter-spacing:.25em;color:var(--muted2);padding:14px 8px;
}
.th::before{content:'_';opacity:.5;}

.user-row{
  display:grid;grid-template-columns:1.5fr 2fr 1fr 1fr 2.2fr;
  padding:0 24px;border-bottom:1px solid var(--border2);
  transition:background .15s;align-items:center;
  position:relative;
}
.user-row:last-child{border-bottom:none;}
.user-row:hover{background:rgba(0,229,255,.03);}
.user-row:hover::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:2px;
  background:var(--cyan);
}
.td{padding:16px 8px;}

.user-name{font-weight:600;color:#fff;font-size:.9rem;}
.user-username{
  font-family:'Share Tech Mono',monospace;font-size:.7rem;
  color:var(--cyan);margin-top:3px;letter-spacing:.05em;
}
.user-username::before{content:'@';vertical-align:-1.5px;}
.user-email{font-size:.8rem;color:var(--muted);}
.user-org{font-size:.8rem;color:var(--muted2);}
.date-val{
  font-family:'Share Tech Mono',monospace;font-size:.7rem;
  color:var(--muted2);
}

/* BADGES */
.badge{
  display:inline-flex;align-items:center;gap:5px;
  font-family:'Share Tech Mono',monospace;font-size:.6rem;
  letter-spacing:.15em;padding:4px 10px;
  clip-path:polygon(6px 0%,100% 0%,calc(100% - 6px) 100%,0% 100%);
}
.badge-dot{width:4px;height:4px;border-radius:50%;}
.badge.pending{background:rgba(255,179,0,.1);color:var(--amber);border:1px solid rgba(255,179,0,.25);}
.badge.pending .badge-dot{background:var(--amber);box-shadow:0 0 6px var(--amber);}
.badge.approved{background:var(--green3);color:var(--green);border:1px solid rgba(57,255,20,.25);}
.badge.approved .badge-dot{background:var(--green);box-shadow:0 0 6px var(--green);}
.badge.rejected{background:rgba(255,51,85,.1);color:var(--red);border:1px solid rgba(255,51,85,.25);}
.badge.rejected .badge-dot{background:var(--red);}

/* ACTION BUTTONS */
.actions{display:flex;gap:6px;margin-left:14px;}
.btn-approve{
  font-family:'Share Tech Mono',monospace;font-size:.6rem;
  letter-spacing:.1em;padding:5px 11px;
  background:var(--green3);border:1px solid rgba(57,255,20,.25);
  color:var(--green);cursor:pointer;transition:all .2s;
  clip-path:polygon(5px 0%,100% 0%,calc(100% - 5px) 100%,0% 100%);
}
.btn-approve:hover{background:rgba(57,255,20,.2);border-color:var(--green2);box-shadow:0 0 12px rgba(57,255,20,.2);}
.btn-reject{
  font-family:'Share Tech Mono',monospace;font-size:.6rem;
  letter-spacing:.1em;padding:5px 11px;
  background:rgba(255,51,85,.08);border:1px solid rgba(255,51,85,.2);
  color:var(--red);cursor:pointer;transition:all .2s;
  clip-path:polygon(5px 0%,100% 0%,calc(100% - 5px) 100%,0% 100%);
}
.btn-reject:hover{background:rgba(255,51,85,.15);border-color:var(--red2);box-shadow:0 0 12px rgba(255,51,85,.15);}
.btn-disabled{opacity:.2;cursor:not-allowed;pointer-events:none;}
.btn-delete{
  font-family:'Share Tech Mono',monospace;font-size:.6rem;
  letter-spacing:.1em;padding:5px 11px;
  background:rgba(255,100,0,.08);border:1px solid rgba(255,100,0,.2);
  color:#ff6400;cursor:pointer;transition:all .2s;
  clip-path:polygon(5px 0%,100% 0%,calc(100% - 5px) 100%,0% 100%);
}
.btn-delete:hover{background:rgba(255,100,0,.2);border-color:rgba(255,100,0,.5);box-shadow:0 0 12px rgba(255,100,0,.2);}

/* EMPTY */
.empty{
  text-align:center;padding:80px 20px;
  font-family:'Share Tech Mono',monospace;font-size:.75rem;
  letter-spacing:.25em;color:var(--muted2);
}
.empty-icon{font-size:2rem;margin-bottom:12px;opacity:.3;}

/* TOAST */
.toast{
  position:fixed;bottom:32px;right:32px;z-index:999;
  font-family:'Share Tech Mono',monospace;font-size:.7rem;
  letter-spacing:.1em;padding:12px 20px;
  background:rgba(4,15,26,.95);
  border:1px solid var(--border);
  backdrop-filter:blur(20px);
  opacity:0;transition:all .3s;pointer-events:none;
  clip-path:polygon(10px 0%,100% 0%,calc(100% - 10px) 100%,0% 100%);
  transform:translateY(10px);
}
.toast.show{opacity:1;transform:translateY(0);}
.toast.ok{border-color:rgba(57,255,20,.4);color:var(--green);}
.toast.ok::before{content:'✓ ';}
.toast.err{border-color:var(--red2);color:var(--red);}
.toast.err::before{content:'⚠ ';}

/* LOADING */
.loading-bar{
  position:fixed;top:0;left:0;height:2px;z-index:999;
  background:linear-gradient(90deg,var(--cyan),var(--green));
  animation:loading .8s ease-in-out;
  box-shadow:0 0 10px var(--cyan);
}
@keyframes loading{from{width:0;opacity:1;}to{width:100%;opacity:0;}}

@media(max-width:768px){
  .stats{grid-template-columns:repeat(2,1fr);}
  .table-header,.user-row{grid-template-columns:1fr 1fr 1fr;}
  .th:nth-child(n+4),.td:nth-child(n+4){display:none;}
  .main{padding:24px 16px;}
  .topbar{padding:0 16px;}
}
</style>
</head>
<body>

<div class="bg-canvas">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>
<div class="grid-overlay"></div>
<div class="scanlines"></div>





<div class="content">

<!-- TOPBAR -->
<div class="topbar">
  <div class="logo">
    <img src="favicon.png" style="width:32px;height:32px;object-fit:contain;filter:drop-shadow(0 0 4px rgba(0,229,255,.25));">
    <div>
      <div class="logo-text">FIRESENSE</div>
      <div class="logo-sub">LDAP CONTROL</div>
    </div>
  </div>
  <div class="topbar-right">
    <div class="sys-status">
      <div class="sys-dot"></div>
      <div class="sys-txt">SISTEMA OPERATIU</div>
    </div>
    <div class="admin-badge">ROOT ACCESS</div>
    <button class="btn-logout" onclick="logout()" id="btn-logout" style="display:none;">[ SORTIR ]</button>
  </div>
</div>

<!-- LOGIN -->
<div id="login-screen" class="login-wrap">
  <div class="login-box">
    <div class="login-header">
      <div class="login-eyebrow">// ACCÉS RESTRINGIT · AUTORITZACIÓ REQUERIDA</div>
      <div class="login-title">LDAP <span>CONTROL</span></div>
    </div>
    <div class="login-body">
      <div class="field">
        <div class="field-lbl">IDENTIFICADOR</div>
        <input class="field-inp" id="adm-user" type="text" placeholder="admin" autocomplete="username">
      </div>
      <div class="field">
        <div class="field-lbl">CLAU D'ACCÉS</div>
        <input class="field-inp" id="adm-pass" type="password" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn-enter" onclick="adminLogin()">INICIAR SESSIÓ →</button>
      <div class="login-err" id="login-err">CREDENCIALS NO VÀLIDES</div>
    </div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none;">
  <div class="main">
    <div class="page-header">
      <div class="page-eyebrow">FIRESENSE · LDAP CONTROL</div>
      <div class="page-title">GESTIÓ <span>D'USUARIS</span></div>
    </div>

    <div class="stats">
      <div class="stat total" style="animation-delay:.0s">
        <div class="stat-val" id="st-total">0</div>
        <div class="stat-lbl">TOTAL USUARIS</div>
        <div class="stat-bar"><div class="stat-bar-fill" id="bar-total" style="width:100%"></div></div>
      </div>
      <div class="stat pending" style="animation-delay:.1s">
        <div class="stat-val" id="st-pending">0</div>
        <div class="stat-lbl">PENDENTS</div>
        <div class="stat-bar"><div class="stat-bar-fill" id="bar-pending" style="width:0%"></div></div>
      </div>
      <div class="stat approved" style="animation-delay:.2s">
        <div class="stat-val" id="st-approved">0</div>
        <div class="stat-lbl">APROVATS</div>
        <div class="stat-bar"><div class="stat-bar-fill" id="bar-approved" style="width:0%"></div></div>
      </div>
      <div class="stat rejected" style="animation-delay:.3s">
        <div class="stat-val" id="st-rejected">0</div>
        <div class="stat-lbl">REBUTJATS</div>
        <div class="stat-bar"><div class="stat-bar-fill" id="bar-rejected" style="width:0%"></div></div>
      </div>
    </div>

    <div class="filters">
      <span class="filter-label">FILTRE:</span>
      <button class="filter-btn active" onclick="setFilter('all',this)">TOTS</button>
      <button class="filter-btn" onclick="setFilter('pending',this)">PENDENTS</button>
      <button class="filter-btn" onclick="setFilter('approved',this)">APROVATS</button>
      <button class="filter-btn" onclick="setFilter('rejected',this)">REBUTJATS</button>
    </div>

    <div class="table-wrap">
      <div class="table-header">
        <div class="th">USUARI</div>
        <div class="th">EMAIL</div>
        
        <div class="th">DATA</div>
        <div class="th" style="padding-left:15px;">ESTAT</div>
        <div class="th" style="padding-left:95px;">ACCIONS</div>
      </div>
      <div id="users-list"></div>
    </div>
  </div>
</div>

<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>
</div><!-- /content -->

<div class="toast" id="toast"></div>

<script>
let _token = localStorage.getItem('fs_admin_token');
let _users = [];
let _filter = 'all';

async function adminLogin() {
  const user = document.getElementById('adm-user').value.trim();
  const pass = document.getElementById('adm-pass').value;
  const errEl = document.getElementById('login-err');
  errEl.style.display = 'none';
  try {
    const r = await fetch('/fsapi/api/auth/login', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({username:user,password:pass})
    });
    const d = await r.json();
    if (!r.ok || !d.token) { errEl.style.display='block'; return; }
    if (d.username !== 'admin') {
      errEl.textContent = 'ACCÉS DENEGAT · PERMISOS INSUFICIENTS';
      errEl.style.display = 'block'; return;
    }
    _token = d.token;
    localStorage.setItem('fs_admin_token', _token);
    showDashboard();
  } catch(e) { errEl.style.display='block'; }
}

async function showDashboard() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  document.getElementById('btn-logout').style.display = 'block';
  showLoading();
  await loadUsers();
}

function showLoading() {
  const bar = document.createElement('div');
  bar.className = 'loading-bar';
  document.body.appendChild(bar);
  setTimeout(() => bar.remove(), 900);
}

async function loadUsers() {
  try {
    const r = await fetch('/fsapi/api/admin/requests', {
      headers:{'Authorization':'Bearer '+_token}
    });
    const d = await r.json();
    _users = d.users || [];
    updateStats();
    renderUsers();
  } catch(e) { showToast('Error carregant usuaris','err'); }
}

function updateStats() {
  const total = _users.length;
  const pending = _users.filter(u=>u.status==='pending').length;
  const approved = _users.filter(u=>u.status==='approved').length;
  const rejected = _users.filter(u=>u.status==='rejected').length;
  document.getElementById('st-total').textContent = total;
  document.getElementById('st-pending').textContent = pending;
  document.getElementById('st-approved').textContent = approved;
  document.getElementById('st-rejected').textContent = rejected;
  if(total>0){
    document.getElementById('bar-pending').style.width = (pending/total*100)+'%';
    document.getElementById('bar-approved').style.width = (approved/total*100)+'%';
    document.getElementById('bar-rejected').style.width = (rejected/total*100)+'%';
  }
}

function setFilter(f, btn) {
  _filter = f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderUsers();
}

function renderUsers() {
  const list = document.getElementById('users-list');
  const filtered = _filter==='all' ? _users : _users.filter(u=>u.status===_filter);
  if (!filtered.length) {
    list.innerHTML = '<div class="empty"><div class="empty-icon">◈</div>// CAP REGISTRE TROBAT</div>';
    return;
  }
  list.innerHTML = filtered.map(u => `
    <div class="user-row">
      <div class="td">
        <div class="user-name">${u.name||'—'}</div>
        <div class="user-username">${u.username}</div>
      </div>
      <div class="td"><div class="user-email">${u.email}</div></div>
      
      <div class="td"><div class="date-val">${u.created_at?u.created_at.slice(0,10):'—'}</div></div>
      <div class="td">
        <span class="badge ${u.status}">
          <span class="badge-dot"></span>
          ${u.status.toUpperCase()}
        </span>
      </div>
      <div class="td">
        <div class="actions">
          <button class="btn-approve ${u.status==='approved'?'btn-disabled':''}" onclick="action(${u.id},'approve')">APROVAR</button>
          <button class="btn-reject ${u.status==='rejected'?'btn-disabled':''}" onclick="action(${u.id},'reject')">DENEGAR</button>
          <button class="btn-delete" onclick="deleteUser(${u.id},'${u.username}')">ELIMINAR</button>
        </div>
      </div>
    </div>
  `).join('');
}

async function action(id, act) {
  showLoading();
  try {
    const r = await fetch(`/fsapi/api/admin/approve/${id}`, {
      method:'POST',
      headers:{'Authorization':'Bearer '+_token,'Content-Type':'application/json'},
      body:JSON.stringify({action:act})
    });
    const d = await r.json();
    if (!r.ok) { showToast(d.error||'Error','err'); return; }
    showToast(act==='approve'?'USUARI APROVAT · LDAP ACTUALITZAT':'USUARI DENEGAT','ok');
    await loadUsers();
  } catch(e) { showToast('ERROR DE CONNEXIÓ','err'); }
}

function logout() {
  localStorage.removeItem('fs_admin_token');
  _token = null;
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('btn-logout').style.display = 'none';
}

function showToast(msg, type='ok') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  setTimeout(()=>t.classList.remove('show'),3500);
}

document.addEventListener('keydown', e => {
  if (e.key==='Enter' && document.getElementById('login-screen').style.display!=='none') adminLogin();
});

async function deleteUser(id, username) {
  if (!confirm('Eliminar usuari @' + username + '?')) return;
  showLoading();
  try {
    const r = await fetch(`/fsapi/api/admin/delete/${id}`, {
      method: 'DELETE',
      headers: {'Authorization': 'Bearer ' + _token}
    });
    const d = await r.json();
    if (!r.ok) { showToast(d.error || 'Error', 'err'); return; }
    showToast('USUARI ELIMINAT', 'ok');
    await loadUsers();
  } catch(e) { showToast('ERROR DE CONNEXIÓ', 'err'); }
}

if (_token) showDashboard();
</script>
</body>
</html>
