<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FireSense — Portal Agents Forestals</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="css/style.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0a0f0a; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }
        
        header {
            background: linear-gradient(135deg, #1a2f1a, #0d1f0d);
            border-bottom: 2px solid #2d5a2d;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        header img { height: 36px; }
        header h1 { font-size: 1.3rem; color: #4caf50; font-weight: 600; }
        header span { color: #888; font-size: 0.85rem; margin-left: auto; }

        .main { display: flex; flex: 1; overflow: hidden; }

        #map { flex: 1; z-index: 1; }

        .sidebar {
            width: 340px;
            background: #0f1a0f;
            border-left: 1px solid #1e3a1e;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .sidebar-section {
            padding: 16px;
            border-bottom: 1px solid #1e3a1e;
        }

        .sidebar-section h3 {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #4caf50;
            margin-bottom: 12px;
        }

        .risk-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 1.1rem;
            width: 100%;
            justify-content: center;
        }
        .risk-low    { background: #1b4d1b; color: #4caf50; border: 1px solid #4caf50; }
        .risk-medium { background: #4d3a00; color: #ffc107; border: 1px solid #ffc107; }
        .risk-high   { background: #4d1a00; color: #ff5722; border: 1px solid #ff5722; }
        .risk-critic { background: #3a0000; color: #f44336; border: 1px solid #f44336; animation: pulse 1s infinite; }

        @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.6; } }

        .metric-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .metric-card {
            background: #152215;
            border: 1px solid #1e3a1e;
            border-radius: 8px;
            padding: 10px;
            text-align: center;
        }
        .metric-card .val { font-size: 1.4rem; font-weight: 700; color: #4caf50; }
        .metric-card .lbl { font-size: 0.7rem; color: #888; margin-top: 2px; }

        .alert-list { display: flex; flex-direction: column; gap: 8px; }
        .alert-item {
            background: #152215;
            border-left: 3px solid #4caf50;
            border-radius: 4px;
            padding: 8px 12px;
            font-size: 0.82rem;
        }
        .alert-item.warn { border-color: #ffc107; }
        .alert-item.danger { border-color: #f44336; }
        .alert-item .time { color: #666; font-size: 0.72rem; }

        .node-list { display: flex; flex-direction: column; gap: 6px; }
        .node-item {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #152215;
            border-radius: 6px;
            padding: 8px 12px;
            font-size: 0.82rem;
        }
        .node-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
        .node-dot.online { background: #4caf50; box-shadow: 0 0 6px #4caf50; }
        .node-dot.offline { background: #666; }
        .node-info { flex: 1; }
        .node-info .name { font-weight: 600; }
        .node-info .vals { color: #888; font-size: 0.75rem; }

        .refresh-btn {
            margin: 12px 16px;
            padding: 8px;
            background: #1e3a1e;
            border: 1px solid #2d5a2d;
            border-radius: 6px;
            color: #4caf50;
            cursor: pointer;
            font-size: 0.82rem;
            width: calc(100% - 32px);
            transition: background 0.2s;
        }
        .refresh-btn:hover { background: #2d5a2d; }

        .last-update { text-align: center; color: #444; font-size: 0.72rem; padding: 8px; }
    </style>
</head>
<body>

<header>
    <img src="favicon.png" alt="FireSense">
    <h1>🌲 Portal Agents Forestals — FireSense</h1>
    <span id="clock">--:--:--</span>
</header>

<div class="main">
    <div id="map"></div>
    <div class="sidebar">

        <div class="sidebar-section">
            <h3>Nivell de Risc Global</h3>
            <div class="risk-badge risk-low" id="risk-badge">
                <span id="risk-icon">🟢</span>
                <span id="risk-text">Carregant...</span>
            </div>
        </div>

        <div class="sidebar-section">
            <h3>Mètriques en Temps Real</h3>
            <div class="metric-grid">
                <div class="metric-card">
                    <div class="val" id="avg-temp">--</div>
                    <div class="lbl">Temp. Mitjana (°C)</div>
                </div>
                <div class="metric-card">
                    <div class="val" id="avg-moisture">--</div>
                    <div class="lbl">Humitat Sòl (%)</div>
                </div>
                <div class="metric-card">
                    <div class="val" id="nodes-online">--</div>
                    <div class="lbl">Nodes Actius</div>
                </div>
                <div class="metric-card">
                    <div class="val" id="anomalies-count">--</div>
                    <div class="lbl">Anomalies (24h)</div>
                </div>
            </div>
        </div>

        <div class="sidebar-section">
            <h3>Alertes Recents</h3>
            <div class="alert-list" id="alert-list">
                <div class="alert-item">Carregant alertes...</div>
            </div>
        </div>

        <div class="sidebar-section">
            <h3>Estat dels Nodes</h3>
            <div class="node-list" id="node-list">
                <div class="node-item">Carregant nodes...</div>
            </div>
        </div>

        <button class="refresh-btn" onclick="loadData()">🔄 Actualitzar dades</button>
        <div class="last-update" id="last-update">Última actualització: --</div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="js/config.js"></script>
<script>
const API_BASE = '/fsapi/v2/api';
const COLLSEROLA_CENTER = [41.425, 2.065];

// Mapa Leaflet
const map = L.map('map').setView(COLLSEROLA_CENTER, 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors',
    maxZoom: 19
}).addTo(map);

// Zona Collserola
const collserolaBounds = [
    [41.38, 1.98], [41.38, 2.15],
    [41.47, 2.15], [41.47, 1.98]
];
L.rectangle(collserolaBounds, {
    color: '#4caf50', weight: 2, fillOpacity: 0.05, dashArray: '5,5'
}).addTo(map).bindPopup('<b>Parc Natural de Collserola</b><br>Zona de monitorització FireSense');

const nodeMarkers = {};

function getRiskColor(moisture) {
    if (moisture < 15) return '#f44336';
    if (moisture < 30) return '#ff5722';
    if (moisture < 50) return '#ffc107';
    return '#4caf50';
}

function updateRiskBadge(level) {
    const badge = document.getElementById('risk-badge');
    const icon = document.getElementById('risk-icon');
    const text = document.getElementById('risk-text');
    const map_risk = {
        'BAIX':    { cls: 'risk-low',    icon: '🟢', label: 'BAIX' },
        'MODERAT': { cls: 'risk-medium', icon: '🟡', label: 'MODERAT' },
        'ALT':     { cls: 'risk-high',   icon: '🟠', label: 'ALT' },
        'CRITIC':  { cls: 'risk-critic', icon: '🔴', label: 'CRÍTIC' }
    };
    const r = map_risk[level] || map_risk['BAIX'];
    badge.className = 'risk-badge ' + r.cls;
    icon.textContent = r.icon;
    text.textContent = r.label;
}

async function loadData() {
    try {
        // Risk
        const riskResp = await fetch(`${API_BASE}/risk`);
        if (riskResp.ok) {
            const risk = await riskResp.json();
            updateRiskBadge(risk.risk_level);
            document.getElementById('avg-temp').textContent =
                risk.metrics.avg_temperature?.toFixed(1) ?? '--';
            document.getElementById('avg-moisture').textContent =
                risk.metrics.avg_soil_moisture?.toFixed(1) ?? '--';
        }

        // Sensors latest
        const sensResp = await fetch(`${API_BASE}/sensors/latest`);
        if (sensResp.ok) {
            const sens = await sensResp.json();
            const devices = {};
            sens.data.forEach(d => {
                if (!devices[d.device]) devices[d.device] = {};
                devices[d.device][d.field] = d.value;
                devices[d.device].time = d.time;
            });

            document.getElementById('nodes-online').textContent = Object.keys(devices).length;

            // Node list
            const nodeList = document.getElementById('node-list');
            nodeList.innerHTML = '';
            Object.entries(devices).forEach(([dev, vals], i) => {
                const temp = vals.temperature?.toFixed(1) ?? '--';
                const mois = vals.soil_moisture?.toFixed(1) ?? '--';
                const color = getRiskColor(vals.soil_moisture ?? 50);
                nodeList.innerHTML += `
                    <div class="node-item">
                        <div class="node-dot online" style="background:${color};box-shadow:0 0 6px ${color}"></div>
                        <div class="node-info">
                            <div class="name">${dev.substring(0,8)}...</div>
                            <div class="vals">🌡️ ${temp}°C · 💧 ${mois}%</div>
                        </div>
                    </div>`;

                // Marker al mapa (offset per separar-los)
                const lat = COLLSEROLA_CENTER[0] + (i * 0.008 - 0.02);
                const lng = COLLSEROLA_CENTER[1] + (i * 0.01 - 0.02);
                const markerIcon = L.divIcon({
                    html: `<div style="background:${color};width:14px;height:14px;border-radius:50%;border:2px solid white;box-shadow:0 0 8px ${color}"></div>`,
                    className: '', iconSize: [14, 14]
                });
                if (nodeMarkers[dev]) map.removeLayer(nodeMarkers[dev]);
                nodeMarkers[dev] = L.marker([lat, lng], {icon: markerIcon})
                    .addTo(map)
                    .bindPopup(`<b>Node: ${dev.substring(0,8)}</b><br>🌡️ Temp: ${temp}°C<br>💧 Humitat: ${mois}%<br>⏱️ ${new Date(vals.time).toLocaleString('ca')}`);
            });

            if (Object.keys(devices).length === 0) {
                nodeList.innerHTML = '<div class="node-item" style="color:#666">Sense nodes actius</div>';
                document.getElementById('nodes-online').textContent = '0';
            }
        }

        // Anomalies
        const anomResp = await fetch(`${API_BASE}/anomalies?hours=24`);
        if (anomResp.ok) {
            const anom = await anomResp.json();
            const anomalies = anom.data.filter(d => d.field === 'is_anomaly' && d.value === 1);
            document.getElementById('anomalies-count').textContent = anomalies.length;

            const alertList = document.getElementById('alert-list');
            if (anomalies.length === 0) {
                alertList.innerHTML = '<div class="alert-item">✅ Sense anomalies detectades</div>';
            } else {
                alertList.innerHTML = anomalies.slice(0,5).map(a => `
                    <div class="alert-item danger">
                        ⚠️ Anomalia detectada — Node: ${a.device.substring(0,8)}
                        <div class="time">${new Date(a.time).toLocaleString('ca')}</div>
                    </div>`).join('');
            }
        }

        document.getElementById('last-update').textContent =
            'Última actualització: ' + new Date().toLocaleTimeString('ca');

    } catch(e) {
        console.error('Error carregant dades:', e);
    }
}

// Rellotge
setInterval(() => {
    document.getElementById('clock').textContent = new Date().toLocaleTimeString('ca');
}, 1000);

// Carregar dades cada 30s
loadData();
setInterval(loadData, 30000);
</script>
</body>
</html>
