<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FireSense — Portal Agents Forestals</title>
<link rel="icon" type="image/png" href="favicon.png?v=5">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;600;700;900&family=Exo+2:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --cyan:#00e5ff;--cyan2:rgba(0,229,255,.6);--cyan3:rgba(0,229,255,.15);
  --green:#39ff14;--green2:rgba(57,255,20,.5);--green3:rgba(57,255,20,.12);
  --red:#ff3355;--amber:#ffb300;--orange:#ff6600;
  --bg:#020912;--bg2:#040f1a;--bg3:#061525;
  --border:rgba(0,229,255,.18);--border2:rgba(0,229,255,.08);
  --text:#c8e8ff;--muted:rgba(180,220,255,.4);
  --glow:0 0 20px rgba(0,229,255,.3);
}
body{background:var(--bg);color:var(--text);font-family:'Exo 2',sans-serif;height:100vh;overflow:hidden;display:flex;flex-direction:column;}
.bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}
.grid-overlay{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(0,229,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,.03) 1px,transparent 1px);background-size:60px 60px;animation:gridShift 20s linear infinite;}
@keyframes gridShift{from{background-position:0 0;}to{background-position:60px 60px;}}
.orb{position:fixed;border-radius:50%;pointer-events:none;filter:blur(80px);z-index:0;}
.orb1{width:500px;height:500px;background:radial-gradient(circle,rgba(0,229,255,.07),transparent 70%);top:-150px;right:-150px;animation:orbFloat1 15s ease-in-out infinite;}
.orb2{width:350px;height:350px;background:radial-gradient(circle,rgba(57,255,20,.05),transparent 70%);bottom:-100px;left:-100px;animation:orbFloat2 20s ease-in-out infinite;}
@keyframes orbFloat1{0%,100%{transform:translate(0,0);}50%{transform:translate(-40px,25px);}}
@keyframes orbFloat2{0%,100%{transform:translate(0,0);}50%{transform:translate(30px,-30px);}}
.scanlines{position:fixed;inset:0;z-index:0;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.08) 2px,rgba(0,0,0,.08) 4px);}

header{
  position:relative;z-index:10;
  background:linear-gradient(90deg,rgba(2,9,18,.98),rgba(4,15,26,.95));
  border-bottom:1px solid var(--border);
  padding:10px 20px;display:flex;align-items:center;gap:16px;
  box-shadow:0 2px 20px rgba(0,229,255,.1);
}
.logo{display:flex;align-items:center;gap:10px;}
.logo img{height:32px;filter:drop-shadow(0 0 3px rgba(0,229,255,.4));}
.logo h1{font-family:'Orbitron',monospace;font-size:1rem;color:var(--cyan);letter-spacing:2px;text-shadow:var(--glow);}
.header-tag{font-family:'Share Tech Mono',monospace;font-size:.7rem;color:var(--green);letter-spacing:1px;background:var(--green3);border:1px solid var(--green2);padding:2px 8px;border-radius:3px;}
.clock{font-family:'Share Tech Mono',monospace;font-size:.9rem;color:var(--cyan);margin-left:auto;text-shadow:var(--glow);}

.main{display:flex;flex:1;overflow:hidden;position:relative;z-index:5;}

#map{flex:1;background:#020912;}
.leaflet-container{background:#020912 !important;}

.sidebar{
  width:320px;background:rgba(4,15,26,.97);
  border-left:1px solid var(--border);
  display:flex;flex-direction:column;overflow-y:auto;
}
.sidebar::-webkit-scrollbar{width:4px;}
.sidebar::-webkit-scrollbar-track{background:var(--bg);}
.sidebar::-webkit-scrollbar-thumb{background:var(--cyan3);border-radius:2px;}

.s-section{padding:14px 16px;border-bottom:1px solid var(--border2);}
.s-label{font-family:'Share Tech Mono',monospace;font-size:.65rem;letter-spacing:2px;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.s-label::before{content:'';display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--cyan);box-shadow:0 0 6px var(--cyan);}

.risk-badge{
  display:flex;align-items:center;justify-content:center;gap:10px;
  padding:10px 20px 10px 18px;border-radius:4px;font-family:'Share Tech Mono',monospace;
  font-size:.85rem;font-weight:400;letter-spacing:3px;
  border:1px solid;background:transparent;transition:all .3s;
}
.risk-low{background:rgba(57,255,20,.08);color:var(--green);border-color:var(--green2);box-shadow:0 0 15px rgba(57,255,20,.15);}
.risk-medium{background:rgba(255,179,0,.08);color:var(--amber);border-color:rgba(255,179,0,.4);box-shadow:0 0 15px rgba(255,179,0,.15);}
.risk-high{background:rgba(255,102,0,.08);color:var(--orange);border-color:rgba(255,102,0,.4);box-shadow:0 0 15px rgba(255,102,0,.15);}
.risk-critic{background:rgba(255,51,85,.1);color:var(--red);border-color:rgba(255,51,85,.5);box-shadow:0 0 20px rgba(255,51,85,.2);animation:pulseRed 1s infinite;}
@keyframes pulseRed{0%,100%{box-shadow:0 0 20px rgba(255,51,85,.2);}50%{box-shadow:0 0 35px rgba(255,51,85,.4);}}

.metric-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.metric-card{
  background:rgba(0,229,255,.03);border:1px solid var(--border2);
  border-radius:6px;padding:10px;text-align:center;
  transition:border-color .2s;
}
.metric-card:hover{border-color:var(--border);}
.metric-val{font-family:'Orbitron',monospace;font-size:1.3rem;font-weight:700;color:var(--cyan);text-shadow:var(--glow);}
.metric-lbl{font-size:.65rem;color:var(--muted);margin-top:3px;letter-spacing:.5px;}

.alert-list{display:flex;flex-direction:column;gap:6px;max-height:150px;overflow-y:auto;}
.alert-item{
  border-left:2px solid var(--green);background:rgba(57,255,20,.04);
  border-radius:0 4px 4px 0;padding:7px 10px;font-size:.75rem;
}
.alert-item.warn{border-color:var(--amber);background:rgba(255,179,0,.04);}
.alert-item.danger{border-color:var(--red);background:rgba(255,51,85,.05);}
.alert-time{color:var(--muted);font-size:.65rem;font-family:'Share Tech Mono',monospace;margin-top:2px;}

.node-list{display:flex;flex-direction:column;gap:5px;}
.node-item{
  display:flex;align-items:center;gap:10px;
  background:rgba(0,229,255,.03);border:1px solid var(--border2);
  border-radius:5px;padding:8px 10px;font-size:.75rem;
  transition:border-color .2s;
}
.node-item:hover{border-color:var(--border);}
.node-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.node-name{font-family:'Share Tech Mono',monospace;color:var(--cyan);font-size:.7rem;}
.node-vals{color:var(--muted);font-size:.68rem;margin-top:1px;}

.refresh-btn{
  margin:10px 16px;padding:9px;cursor:pointer;
  background:rgba(0,229,255,.06);border:1px solid var(--border);
  border-radius:5px;color:var(--cyan);font-family:'Share Tech Mono',monospace;
  font-size:.75rem;letter-spacing:1px;transition:all .2s;
  box-shadow:inset 0 0 20px rgba(0,229,255,.03);
}
.refresh-btn:hover{background:rgba(0,229,255,.12);box-shadow:0 0 15px rgba(0,229,255,.15);}
.last-update{text-align:center;color:var(--muted);font-size:.65rem;font-family:'Share Tech Mono',monospace;padding:6px 16px 12px;}

/* Leaflet custom dark */
.leaflet-tile{filter:invert(1) hue-rotate(180deg) brightness(0.7) saturate(0.8);}
.leaflet-control-zoom a{background:var(--bg2)!important;color:var(--cyan)!important;border-color:var(--border)!important;}
</style>
</head>
<body>
<div class="grid-overlay"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="scanlines"></div>

<header>
  <div class="logo">
    <img src="favicon.png" alt="FireSense">
    <h1>FIRESENSE</h1>
    <span class="header-tag">PORTAL AGENTS FORESTALS</span>
  </div>
  <div class="clock" id="clock">--:--:--</div>
</header>

<div class="main">
  <div id="map"></div>
  <div class="sidebar">

    <div class="s-section">
      <div class="s-label">NIVELL DE RISC GLOBAL</div>
      <div class="risk-badge risk-low" id="risk-badge">
        <div class="risk-indicator"></div>
        <span id="risk-text">CARREGANT</span>
      </div>
    </div>

    <div class="s-section">
      <div class="s-label">MÈTRIQUES EN TEMPS REAL</div>
      <div class="metric-grid">
        <div class="metric-card">
          <div class="metric-val" id="avg-temp">--</div>
          <div class="metric-lbl">TEMP (°C)</div>
        </div>
        <div class="metric-card">
          <div class="metric-val" id="avg-moisture">--</div>
          <div class="metric-lbl">HUMITAT SÒL (%)</div>
        </div>
        <div class="metric-card">
          <div class="metric-val" id="nodes-online">--</div>
          <div class="metric-lbl">NODES ACTIUS</div>
        </div>
        <div class="metric-card">
          <div class="metric-val" id="anomalies-count">--</div>
          <div class="metric-lbl">ANOMALIES 24H</div>
        </div>
      </div>
    </div>

    <div class="s-section">
      <div class="s-label">ALERTES RECENTS</div>
      <div class="alert-list" id="alert-list">
        <div class="alert-item">Carregant alertes...</div>
      </div>
    </div>

    <div class="s-section">
      <div class="s-label">ESTAT NODES IoT</div>
      <div class="node-list" id="node-list">
        <div class="node-item"><span style="color:var(--muted)">Carregant nodes...</span></div>
      </div>
    </div>

    <button class="refresh-btn" onclick="loadData()">⟳ ACTUALITZAR DADES</button>
    <div class="last-update" id="last-update">ÚLTIMA ACTUALITZACIÓ: --</div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const API_BASE = '/fsapi/v2/api';
const CENTER = [41.425, 2.065];

const map = L.map('map',{zoomControl:true}).setView(CENTER,13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  attribution:'© OpenStreetMap',maxZoom:19
}).addTo(map);

// Zona Collserola
L.rectangle([[41.38,1.98],[41.47,2.15]],{
  color:'#00e5ff',weight:1,fillOpacity:0.03,dashArray:'6,4'
}).addTo(map).bindPopup('<b style="color:#00e5ff">Parc Natural de Collserola</b><br>Zona monitorització FireSense');

const nodeMarkers={};

function getRiskColor(m){
  if(m<15)return'#ff3355';
  if(m<30)return'#ff6600';
  if(m<50)return'#ffb300';
  return'#39ff14';
}

function updateRisk(level){
  const badge=document.getElementById('risk-badge');
  const icon=document.getElementById('risk-icon');
  const text=document.getElementById('risk-text');
  const r={
    'BAIX':   {cls:'risk-low',   icon:'◆',label:'BAIX'},
    'MODERAT':{cls:'risk-medium',icon:'◈',label:'MODERAT'},
    'ALT':    {cls:'risk-high',  icon:'◉',label:'ALT'},
    'CRITIC': {cls:'risk-critic',icon:'⬟',label:'CRÍTIC'}
  }[level]||{cls:'risk-low',icon:'◆',label:'BAIX'};
  badge.className='risk-badge '+r.cls;
  text.textContent=r.label;
}

async function loadData(){
  try{
    const [riskR,sensR,anomR]=await Promise.all([
      fetch(`${API_BASE}/risk`),
      fetch(`${API_BASE}/sensors/latest`),
      fetch(`${API_BASE}/anomalies?hours=24`)
    ]);

    if(riskR.ok){
      const d=await riskR.json();
      updateRisk(d.risk_level);
      document.getElementById('avg-temp').textContent=d.metrics.avg_temperature?.toFixed(1)??'--';
      document.getElementById('avg-moisture').textContent=d.metrics.avg_soil_moisture?.toFixed(1)??'--';
    }

    if(sensR.ok){
      const d=await sensR.json();
      const devs={};
      d.data.forEach(r=>{
        if(!devs[r.device])devs[r.device]={};
        devs[r.device][r.field]=r.value;
        devs[r.device].time=r.time;
      });
      document.getElementById('nodes-online').textContent=Object.keys(devs).length;
      const nl=document.getElementById('node-list');
      nl.innerHTML='';
      Object.entries(devs).forEach(([dev,vals],i)=>{
        const temp=vals.temperature?.toFixed(1)??'--';
        const mois=vals.soil_moisture?.toFixed(1)??'--';
        const col=getRiskColor(vals.soil_moisture??50);
        nl.innerHTML+=`<div class="node-item">
          <div class="node-dot" style="background:${col};box-shadow:0 0 6px ${col}"></div>
          <div><div class="node-name">${dev.substring(0,12)}</div>
          <div class="node-vals">🌡 ${temp}°C &nbsp;💧 ${mois}%</div></div>
        </div>`;
        const lat=CENTER[0]+(i*0.008-0.02);
        const lng=CENTER[1]+(i*0.01-0.02);
        const ico=L.divIcon({html:`<div style="width:12px;height:12px;border-radius:50%;background:${col};border:2px solid rgba(255,255,255,.8);box-shadow:0 0 10px ${col}"></div>`,className:'',iconSize:[12,12]});
        if(nodeMarkers[dev])map.removeLayer(nodeMarkers[dev]);
        nodeMarkers[dev]=L.marker([lat,lng],{icon:ico}).addTo(map)
          .bindPopup(`<b style="color:#00e5ff">${dev.substring(0,12)}</b><br>🌡 ${temp}°C<br>💧 ${mois}%`);
      });
      if(!Object.keys(devs).length){
        nl.innerHTML='<div class="node-item"><span style="color:var(--muted)">Sense nodes actius</span></div>';
        document.getElementById('nodes-online').textContent='0';
      }
    }

    if(anomR.ok){
      const d=await anomR.json();
      const anom=d.data.filter(r=>r.field==='is_anomaly'&&r.value===1);
      document.getElementById('anomalies-count').textContent=anom.length;
      const al=document.getElementById('alert-list');
      al.innerHTML=anom.length?anom.slice(0,5).map(a=>`
        <div class="alert-item danger">
          ⚠ Anomalia — ${a.device.substring(0,10)}
          <div class="alert-time">${new Date(a.time).toLocaleString('ca')}</div>
        </div>`).join(''):'<div class="alert-item">✓ Sense anomalies detectades</div>';
    }
    document.getElementById('last-update').textContent='ÚLTIMA ACTUALITZACIÓ: '+new Date().toLocaleTimeString('ca');
  }catch(e){console.error(e);}
}

setInterval(()=>document.getElementById('clock').textContent=new Date().toLocaleTimeString('ca'),1000);
loadData();
setInterval(loadData,30000);
</script>
</body>
</html>
