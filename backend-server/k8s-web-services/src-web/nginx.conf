server {
    listen 80;
    root /usr/share/nginx/html;
    index home.html;

    location /FireSense/ {
        alias /usr/share/nginx/html/;
        index home.html;
        try_files $uri $uri/ /FireSense/home.html;
    }

    location /api/ {
        proxy_pass http://auth-service:5000/api/;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
