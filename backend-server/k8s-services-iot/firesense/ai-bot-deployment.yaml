apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-bot
  namespace: firesense
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-bot
  template:
    metadata:
      labels:
        app: ai-bot
    spec:
      containers:
        - name: ai-bot
          image: 93d92c4a-e3bf-4ea6-93c6.afab44153cac.isard.nuvulet.itb.cat/library/ai-bot:v1
          envFrom:
            - secretRef:
                name: ai-bot-secret
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"